default: &default
  adapter: postgresql
  encoding: unicode
  pool:     <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host:     <%= ENV.fetch("DB_HOST",     "localhost") %>
  username: <%= ENV.fetch("DB_USERNAME", "postgres")  %>
  password: <%= ENV.fetch("DB_PASSWORD", "")          %>
  database: <%= ENV.fetch("DB_NAME",     "lumen_development") %>

development:
  <<: *default

test:
  <<: *default
  database: <%= ENV.fetch("DB_NAME", "lumen_development") %>_test

production:
  url:  <%= ENV["DATABASE_URL"] %>
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
